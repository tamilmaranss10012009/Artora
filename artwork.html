<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="artwork-page">

    <img id="artImage" src="images/bear.jpg" alt="Painting">

    <div class="art-info">
        <h1 id="artTitle">Beautiful Painting</h1>

        <h2 id="artPrice">₹2,500</h2>

        <p id="artDesc">
This handmade painting is created using premium acrylic colors.
Perfect for home decoration, office interiors and gifting.
Made by an experienced artist with attention to every detail.
</p>

    <div class="button-group">

    <a id="buyLink" class="buy-btn">
        Buy Now
    </a>

    <button id="cartBtn" class="buy-btn">
        Add to Cart
    </button>

</div>
    </div>

</div>
<script>
const artworks = {
    1: {
        title: "Sunset Painting",
        price: "₹2,499",
        image: "images/sunset.jpg",
        desc: "Beautiful sunset painting perfect for home decoration."
    },

    2: {
        title: "Bear Painting",
        price: "₹2,500",
        image: "images/bear.jpg",
        desc: "Beautiful handmade bear painting created using premium acrylic colors."
    },

    3: {
        title: "Bull Painting",
        price: "₹1,200",
        image: "images/bull.jpg",
        desc: "Beautiful handmade bull painting created using premium acrylic colors."
    },

    4: {
    title: "Tiger Painting",
    price: "₹3,000",
    image: "images/tiger.jpg",
    desc: "Beautiful handmade tiger painting created using premium acrylic colors."
}
};

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (artworks[id]) {
    document.getElementById("artTitle").innerText = artworks[id].title;
    document.getElementById("artPrice").innerText = artworks[id].price;
    document.getElementById("artImage").src = artworks[id].image;
    document.getElementById("artDesc").innerText = artworks[id].desc;
    document.getElementById("buyLink").href = "checkout.html?id=" + id;
}
document.getElementById("cartBtn").addEventListener("click", function () {

    let cart = JSON.parse(localStorage.getItem("cartItems")) || [];

    const existingItem = cart.find(item => item.title === artworks[id].title);

if (existingItem) {
    existingItem.quantity++;
} else {
    cart.push({
        ...artworks[id],
        quantity: 1
    });
}

    localStorage.setItem("cartItems", JSON.stringify(cart));

    alert("Added to Cart!");

    window.location.href = "cart.html";

});
</script>
</body>
</html>
