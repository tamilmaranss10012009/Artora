<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="checkout-page">

    <div class="checkout-card">

        <div class="checkout-info">

            <h1>🛒 My Cart</h1>

            <div id="cartItems">
    <p>Your cart is empty.</p>
</div>

<h2 id="grandTotal">Grand Total: ₹0</h2>

<div class="button-group">
    <a href="checkout.html" class="buy-btn" id="checkoutBuyBtn">
        Buy Now
    </a>

    <a href="../index.html" class="buy-btn">
        Continue Shopping
    </a>

</div>

<script>
  // Require login before going to checkout
  document.getElementById("checkoutBuyBtn")?.addEventListener("click", function(e) {
    if (localStorage.getItem("loggedIn") !== "true") {
      e.preventDefault();
      showToast("Please login to checkout", "warning");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1000);
    }
  });
</script>

        </div>

    </div>

</div>

<script src="../js/utils.js"></script>
<script src="../js/cart.js"></script>

</body>
</html>
