<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artwork Details</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="artwork-page">
      <img id="artImage" src="../images/bear.jpg" alt="Painting" />

      <div class="art-info">
        <h1 id="artTitle">Beautiful Painting</h1>

        <h2 id="artPrice">₹2,500</h2>

        <p id="artDesc">
          This handmade painting is created using premium acrylic colors.
          Perfect for home decoration, office interiors and gifting. Made by an
          experienced artist with attention to every detail.
        </p>

        <div class="button-group">
          <a id="buyLink" class="buy-btn"> Buy Now </a>

          <button id="cartBtn" class="buy-btn">Add to Cart</button>
        </div>
      </div>
    </div>
    <script src="../js/artwork.js"></script>
  </body>
</html>
