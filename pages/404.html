<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Artora</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .error-box {
            max-width: 500px;
            margin: 80px auto;
            padding: 60px 40px;
            background: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .error-box h1 {
            font-size: 72px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .error-box h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }
        .error-box p {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
        <a href="../index.html">
            <button>⬅ Back to Home</button>
        </a>
    </div>
</body>
</html>
