<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="checkout-page">
      <div class="checkout-card">
        <div class="checkout-info">
          <h1>🛒 Checkout</h1>

          <div id="orderSummary">
            <h2>Order Summary</h2>

            <div id="summaryItems">Loading...</div>

            <hr />
            <br />

            <h2 id="checkoutTotal">Grand Total: ₹0</h2>
          </div>
          <form id="checkoutForm">
            <input type="text" id="checkoutName" placeholder="Full Name" required />

            <input type="tel" id="checkoutPhone" placeholder="Mobile Number" required />

            <input type="text" id="checkoutAddress" placeholder="Street Address" required />

            <input type="text" id="checkoutCity" placeholder="City" required />

            <input type="text" id="checkoutState" placeholder="State" required />

            <input type="text" id="checkoutPincode" placeholder="Pincode" required />

            <h3>Payment Method</h3>
            <select id="paymentMethod" required>
              <option value="">Select Payment Method</option>
              <option value="COD">💵 Cash on Delivery</option>
              <option value="UPI">📱 UPI Payment</option>
              <option value="Card">💳 Card Payment</option>
            </select>

            <button type="submit">Place Order</button>
          </form>
        </div>
      </div>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/checkout.js"></script>
  </body>
</html>
