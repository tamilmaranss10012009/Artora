<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="checkout-page">

    <div class="checkout-card">

        <div class="checkout-info">

            <h1>🎨 Upload Artwork</h1>

            <form id="artistForm">

                <input
                    type="text"
                    id="artTitle"
                    placeholder="Artwork Title"
                    required
                >

                <input
                    type="text"
                    id="artPrice"
                    placeholder="Price (Example: ₹2500)"
                    required
                >

                <input
                    type="text"
                    id="artImage"
                    placeholder="Image Path (Example: images/bear.jpg)"
                    required
                >

                <textarea
                    id="artDesc"
                    placeholder="Artwork Description"
                    required
                ></textarea>

                <button type="submit">
                    Upload Artwork
                </button>

            </form>

        </div>

    </div>

</div>

<script src="artist.js"></script>

</body>
</html>
